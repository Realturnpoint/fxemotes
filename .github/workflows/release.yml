name: Release Stream Deck Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin bundle
        run: npm run build

      - name: Package .streamDeckPlugin
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $pluginId = "com.turnpoint.fxemotes"
          $pluginDir = "dist/$pluginId.sdPlugin"
          New-Item -ItemType Directory -Force -Path "$pluginDir/bin" | Out-Null

          Copy-Item -Force "plugin/manifest.json" "$pluginDir/"
          Copy-Item -Recurse -Force "plugin/imgs" "$pluginDir/"
          Copy-Item -Recurse -Force "plugin/ui" "$pluginDir/"

          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) {
            $version = $version.Substring(1)
          }

          if ($version -match '^\d+\.\d+\.\d+$') {
            $version = "$version.0"
          }

          if (-not ($version -match '^\d+\.\d+\.\d+\.\d+$')) {
            throw "Tag version must be v<major>.<minor>.<patch> or v<major>.<minor>.<patch>.<build>. Received '$version'."
          }

          $manifestPath = "$pluginDir/manifest.json"
          $manifest = Get-Content -Raw -Path $manifestPath | ConvertFrom-Json

          if ($manifest.Version -ne $version) {
            throw "Manifest version '$($manifest.Version)' must match release tag version '$version'. Update plugin/manifest.json before creating the release tag."
          }

          $manifest.Version = $version
          $manifest | ConvertTo-Json -Depth 20 | Set-Content -Path $manifestPath -Encoding UTF8

          $zipPath = "dist/$pluginId.zip"
          $pluginPackage = "dist/$pluginId.streamDeckPlugin"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          if (Test-Path $pluginPackage) { Remove-Item $pluginPackage -Force }

          Compress-Archive -Path $pluginDir -DestinationPath $zipPath
          Move-Item -Path $zipPath -Destination $pluginPackage
          Write-Host "Created $pluginPackage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamdeck-plugin
          path: dist/com.turnpoint.fxemotes.streamDeckPlugin

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/com.turnpoint.fxemotes.streamDeckPlugin
          generate_release_notes: true
